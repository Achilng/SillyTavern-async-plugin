<div id="reply_polisher_settings" class="reply-polisher-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Reply Polisher</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" for="reply_polisher_enabled">
                <input id="reply_polisher_enabled" type="checkbox" />
                <span>启用</span>
            </label>
            <label class="checkbox_label" for="reply_polisher_auto_rewrite">
                <input id="reply_polisher_auto_rewrite" type="checkbox" />
                <span>自动润色助手回复</span>
            </label>

            <div class="reply-polisher-section">
                <label for="reply_polisher_base_url">模型 B base URL</label>
                <input id="reply_polisher_base_url" type="text" autocomplete="off" placeholder="https://api.example.com/v1" />

                <label for="reply_polisher_api_key">模型 B API key</label>
                <input id="reply_polisher_api_key" type="password" autocomplete="off" placeholder="留空则保留已保存密钥" />

                <label class="checkbox_label" for="reply_polisher_clear_api_key">
                    <input id="reply_polisher_clear_api_key" type="checkbox" />
                    <span>清除已保存 API key</span>
                </label>

                <label for="reply_polisher_model">模型 B 模型名</label>
                <input id="reply_polisher_model" type="text" autocomplete="off" placeholder="model-b-name" />
                <div class="reply-polisher-actions reply-polisher-model-picker">
                    <button id="reply_polisher_load_models" class="menu_button" type="button">获取模型列表</button>
                    <select id="reply_polisher_model_list" aria-label="选择模型" disabled>
                        <option value="">选择模型...</option>
                    </select>
                </div>

                <div class="reply-polisher-actions">
                    <button id="reply_polisher_save_connection" class="menu_button" type="button">保存模型设置</button>
                    <button id="reply_polisher_test_connection" class="menu_button" type="button">测试模型</button>
                    <span id="reply_polisher_key_status" class="reply-polisher-status"></span>
                </div>
            </div>

            <div class="reply-polisher-section">
                <label for="reply_polisher_prompt">改写提示词</label>
                <textarea id="reply_polisher_prompt" rows="5"></textarea>

                <div class="reply-polisher-grid">
                    <label for="reply_polisher_temperature">
                        温度
                        <input id="reply_polisher_temperature" type="number" min="0" max="2" step="0.1" />
                    </label>
                    <label for="reply_polisher_max_tokens">
                        最大 tokens
                        <input id="reply_polisher_max_tokens" type="number" min="1" max="200000" step="1" />
                    </label>
                    <label for="reply_polisher_timeout_ms">
                        超时毫秒
                        <input id="reply_polisher_timeout_ms" type="number" min="1000" max="600000" step="1000" />
                    </label>
                </div>

                <div class="reply-polisher-actions">
                    <button id="reply_polisher_manual_rewrite" class="menu_button" type="button">润色最新回复</button>
                </div>
            </div>
        </div>
    </div>
</div>
